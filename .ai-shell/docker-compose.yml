# Generated by ai-shell init
# Works with both docker compose and podman-compose
#
# Note: workdir is discovered from the /work bind mount (..:/work),
# so this file is portable across machines.

services:
  ai-shell:
    build:
      context: .
      args:
        - BASE_IMAGE=${BASE_IMAGE:-ubuntu:24.04}
    image: ai-agent-shell-21e1dff73f
    container_name: ai-agent-shell-21e1dff73f
    labels:
      net.datatheory.ai-shell.managed: "true"
      net.datatheory.ai-shell.schema: "1"
      net.datatheory.ai-shell.instance: "21e1dff73f"
      net.datatheory.ai-shell.volume: "ai_agent_shell_home_21e1dff73f"
    volumes:
      - ..:/work                           # parent dir = workdir (source of truth)
      - ai_agent_shell_home_21e1dff73f:/root
      - ${HOME}/.config/cursor:/root/.config/cursor:ro
    env_file:
      - path: ${AI_SHELL_ENV_FILE:-/dev/null}
        required: false
    command: ["sh", "-c", "while true; do sleep 3600; done"]

volumes:
  ai_agent_shell_home_21e1dff73f:
    external: false
